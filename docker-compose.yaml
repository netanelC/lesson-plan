# This is a Docker Compose configuration file for setting up a PostgreSQL database and MinIO for testing.
# Do not use this configuration in production environments.

services:
  postgresql:
    image: postgres:15
    ports:
      - "5432:5432"
    container_name: 'postgres-for-testing'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lesson_plan
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off -c random_page_cost=1.0
    # Disable persistence to improve performance in tests (RAM disk)
    tmpfs: /var/lib/postgresql/data

  minio:
    container_name: 'minio'
    image: minio/minio:latest
    ports:
      - "9000:9000" # API Port (Code talks to this)
      - "9001:9001" # Web Console (You login here)
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: always
    # Start the server and enable the web UI
    command: server /data --console-address ":9001"
    volumes:
      # Named volume to store files (persists between restarts unlike tmpfs)
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbucket:
    image: minio/mc:latest
    container_name: 'minio-client'
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb --region us-east-1 minio/lesson-attachments;
      mc policy set public minio/lesson-attachments;
      sleep infinity;
      "

volumes:
  minio_data:
